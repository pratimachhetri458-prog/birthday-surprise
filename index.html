 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ❤️</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            transition: opacity 0.5s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .envelope {
            background: #ff7597;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            text-align: center;
            color: white;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .envelope:hover {
            transform: scale(1.05);
        }

        .heart-seal {
            font-size: 3rem;
            animation: heartbeat 1.2s infinite;
        }

        h1 {
            color: #d63384;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 160px);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            color: #4a4a4a;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #fff0f5;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            position: relative;
            text-align: center;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
        min-height: 350px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.15); }
            80% { transform: scale(1); }
            100% { transform: scale(1); }
        }
     <div id="modal-body">
    </div>
     .modal-image {
        width: 100%;
        max-height: 280px;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    
    .modal-note {
        font-size: 1.15rem;
        line-height: 1.5;
        color: #d81b60;
        font-weight: 500;
        margin-top: 10px;
    }
</style>
</head>
<body>


    <div id="welcome-screen" class="screen">
        <div class="envelope" onclick="openSurprise()">
            <div class="heart-seal">❤️</div>
            <p>Click to Open Your Surprise</p>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <h1>Happy Birthday, My Love! ✨</h1>
        
        <div class="card-grid">
            <div class="card" onclick="openModal('secret')">🔒 Lock & Key</div>
            <div class="card" onclick="openModal('cake')">🎂 Blow the Candles</div>
            <div class="card" onclick="openModal('letter')">✉️ A Letter for You</div>
            <div class="card" onclick="openModal('gift')">🎁 Your Gift</div>
            <div class="card" onclick="openModal('my favourite view')">📸 My favourite view</div>
            <div class="card" onclick="openModal('song')">🎵 Song</div>
        </div>
    </div>

    <div id="modal" class="modal hidden" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        function openSurprise() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function openModal(type) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            
            if (type === 'secret') {
                body.innerHTML = `
                <h3 style="margin-bottom: 12px; color: #d63384; font-size: 1.8rem; text-align: center;">A Safe for Secrets 🔒</h3>
                <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px; text-align: center;">My heart is locked across the distance. Enter code to unwrap the secret!</p>
            
                <div id="lock-box" style="background: #fff0f5; padding: 25px 15px; border-radius: 15px; border: 2px dashed #ff7597; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 10px rgba(255,117,151,0.1);">
                     <span id="lock-icon" style="font-size: 3rem; margin-bottom: 15px; transition: transform 0.3s ease;">🔒</span>
                     <input type="text" id="lock-input" placeholder="DDMMYY" maxlength="6" style="width: 120px; padding: 10px; text-align: center; font-size: 1.2rem; border: 2px solid #ff7597; border-radius: 10px; outline: none; margin-bottom: 15px; font-family: sans-serif;">
                     <button onclick="unlockSecretHeart()" style="background: #ff7597; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255,117,151,0.3); font-size: 1rem;">Unlock My Heart</button>
                 </div>
              `;
           }
            else if (type === 'cake') {
                body.innerHTML = `
                    <h3>Make a Wish! 🎂</h3>
                    <div id="candle" style="font-size: 3rem; cursor:pointer; margin:20px 0;" onclick="blowCandle()">🕯️</div>
                    <p id="cake-instruction">Click the candle flame to blow it out!</p>
                `;
            }
            else if (type === 'letter') {
                body.innerHTML = `
                    <h3>To My Favorite Person ✉️</h3>
                    <p style="text-align:left; line-height:1.6; margin-top:15px; font-size: 1rem; font-weight: bold; font-style: italic;">
                        Happy 15th Birthday,my love!💗✨<br>
                        You mean the absolute world to me🌷🌷. Thank you for being the brightest light in my life✨.May your day filled with all the happiness you deserve.I love you in every universe,my love🥺💗.You'll always be my favourite person💋.You're not just my boifren,you're my safe place,my happiness and my home💖.On your special day, i just want to remind you how much you mean to me.My words can't express the love i've for.If you're thinking that you're replaceable in everyone's life bzzzzzz lemme remind you that i'm still alive😛.No man in this world can replace you in my life.
                        Loving you is like breathing oxygen for me.You're my everything my first love,my boifren,my husband and my cutttee bhonduuu chua💋😛
                    </p>
                `;
            } 
            else if (type === 'gift') {
                body.innerHTML = `
            <h3 style="margin-bottom: 12px; color: #d63384; font-size: 1.8rem; text-align: center;">Your Birthday Gift! 🎁</h3>
            <p style="font-size: 0.95rem; color: #555; margin-bottom: 15px; text-align: center;">Sending you a warm, tight squeeze across the miles...</p>
            
            <div style="width: 100%; max-width: 260px; margin: 0 auto; border-radius: 15px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.15); background: #fff;">
            <video src="hug.mp4" autoplay loop muted playsinline style="width: 100%; height: 260px; display: block; object-fit: cover;"></video>
            </div>
            
            <p style="margin-top: 15px; font-style: italic; color: #ff7597; font-weight: bold; text-align: center; line-height: 1.4;">
                "Distance means nothing when you mean everything.<br>Happy Birthday, My Favorite Person! ❤️"
            </p>
        `;
            } 
          else if (type === 'my favourite view') {
                body.innerHTML = `
            <h3 style="margin-bottom: 12px; color: #d63384; font-size: 1.8rem; text-align: center;">My love✨</h3>
        
            <div style="width: 100%; max-width: 260px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
            <img class="modal-image" src="image1.jpeg" alt="My Favorite Person" style="width: 100%; display: block; object-fit: cover;">
            </div>

            <p class="modal-note" style="margin-top: 15px; text-align: center; color: #ff7597; font-size: 1.1rem; line-height: 1.5;">
            Every single day with you is a gift 💖. Happy Birthday to the one who makes my heart smile. I love you! ❤️
            </p>
      `;
           }
         else if (type === 'song') {
                  body.innerHTML = `
                <h3 style="margin-bottom: 12px; color: #d63384; font-size: 1.8rem; text-align: center;">For You, My Love 🎧</h3>
                <p style="margin-bottom: 20px; color: #ff7597; font-style: italic; text-align: center; font-size: 1rem;">
            "song that reminds me of you..."
        </p>
              <div style="width: 100%; max-width: 300px; margin: 0 auto;">
             <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/6bdpj89aYEBjhpsenXAsmO?utm_source=generator&si=42e9e7b8ad9244c4" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
     `;
          }

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function blowCandle() {
            const candle = document.getElementById('candle');
            const text = document.getElementById('cake-instruction');
            candle.innerHTML = '🎂'; 
            text.innerHTML = '✨ Your wish has been sent! ✨';
        }
        function unlockSecretHeart() {
    const input = document.getElementById('lock-input').value.trim();
    const box = document.getElementById('lock-box');
    const icon = document.getElementById('lock-icon');
    
    if (input === '080711') { 
        box.innerHTML = `
            <span style="font-size: 3.5rem; margin-bottom: 10px; display:block;">🔓❤️</span>
            <p style="font-weight: bold; color: #d63384; font-size: 1.3rem; margin-bottom: 8px;">Secret Unlocked!</p>
            <p style="font-size: 0.95rem; color: #444; line-height: 1.5; font-style: italic;">
                "No matter how many hundreds of miles keep us apart, you will always hold the only true key to my heart. Happy Birthday, my favorite person!"
            </p>
        `;
    } else {
        icon.innerText = '❌';
        icon.style.transform = 'scale(1.2)';
        setTimeout(() => { 
            icon.innerText = '🔒'; 
            icon.style.transform = 'scale(1)';
        }, 1500);
    }
}
    </script>
</body>
</html>
